
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Car Price Prediction</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            overflow:hidden;
            background:#050505;
            position:relative;
            color:white;
        }

        /* Animated Background */

        .bg-image{
            position:absolute;
            width:100%;
            height:100%;
            background: url("{{ url_for('static', filename='car-bg.jpg') }}") center center/cover no-repeat;
            transform:scale(1.05);
            filter:brightness(0.35);
            z-index:-3;
        }

        /* Neon Glow */

        .glow{
            position:absolute;
            width:500px;
            height:500px;
            border-radius:50%;
            filter:blur(120px);
            opacity:0.7;
            animation:move 10s infinite alternate ease-in-out;
        }

        .glow1{
            background:#00e5ff;
            top:-100px;
            left:-100px;
        }

        .glow2{
            background:#ff00c8;
            bottom:-120px;
            right:-100px;
        }

        @keyframes move{
            from{
                transform:translateY(0px) translateX(0px);
            }
            to{
                transform:translateY(40px) translateX(30px);
            }
        }

        /* Navbar */

        nav{
            width:100%;
            padding:25px 60px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:fixed;
            top:0;
            left:0;
            z-index:10;
        }

        .logo{
            font-size:32px;
            font-weight:800;
            color:white;
            letter-spacing:2px;
        }

        nav ul{
            display:flex;
            gap:35px;
            list-style:none;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:15px;
            font-weight:500;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:#00e5ff;
        }

        /* Main Section */

        .hero{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:120px 8%;
            position:relative;
        }

        .left{
            width:50%;
        }

        .left h1{
            font-size:95px;
            line-height:100px;
            font-weight:800;
            color:#fff5e7;
        }

        .left span{
            color:#00e5ff;
        }

        .left p{
            margin-top:25px;
            font-size:18px;
            color:#ddd;
            line-height:32px;
            max-width:550px;
        }

        .left .btns{
            margin-top:35px;
            display:flex;
            gap:20px;
        }

        .btn{
            padding:16px 32px;
            border:none;
            border-radius:40px;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            transition:0.4s;
        }

        .btn-primary{
            background:linear-gradient(135deg,#00e5ff,#0077ff);
            color:white;
            box-shadow:0 0 20px rgba(0,229,255,0.4);
        }

        .btn-primary:hover{
            transform:translateY(-5px);
            box-shadow:0 0 35px rgba(0,229,255,0.7);
        }

        .btn-outline{
            background:transparent;
            border:2px solid rgba(255,255,255,0.3);
            color:white;
        }

        .btn-outline:hover{
            background:white;
            color:black;
        }

        /* Glassmorphism Card */

        .card{
            width:420px;
            padding:40px;
            border-radius:30px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(18px);
            box-shadow:0 20px 50px rgba(0,0,0,0.4);
        }

        .card h2{
            font-size:32px;
            margin-bottom:10px;
        }

        .card p{
            color:#d6d6d6;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            background:rgba(255,255,255,0.08);
            color:white;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        .input-box input::placeholder{
            color:#bbb;
        }

        .input-box input:focus{
            background:rgba(255,255,255,0.14);
            box-shadow:0 0 15px rgba(0,229,255,0.4);
        }

        .predict-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:18px;
            background:linear-gradient(135deg,#00e5ff,#0077ff);
            color:white;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:0.4s;
        }

        .predict-btn:hover{
            transform:translateY(-4px);
            box-shadow:0 0 30px rgba(0,229,255,0.6);
        }

        .result{
            margin-top:25px;
            padding:18px;
            border-radius:18px;
            background:rgba(0,229,255,0.08);
            border:1px solid rgba(0,229,255,0.2);
            text-align:center;
        }

        .result h3{
            color:#00e5ff;
            font-size:24px;
        }

        /* Responsive */

        @media(max-width:1100px){

            .hero{
                flex-direction:column;
                justify-content:center;
                gap:60px;
                text-align:center;
            }

            .left{
                width:100%;
            }

            .left h1{
                font-size:65px;
                line-height:75px;
            }

            .left p{
                margin:auto;
                margin-top:20px;
            }

            .left .btns{
                justify-content:center;
            }

        }

        @media(max-width:600px){

            nav{
                padding:20px;
            }

            nav ul{
                display:none;
            }

            .left h1{
                font-size:48px;
                line-height:55px;
            }

            .card{
                width:100%;
            }

        }

    </style>
</head>

<body>

    <div class="bg-image"></div>

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <!-- Navbar -->

    <nav>

        <div class="logo">
            CAR PRICE PREDICTOR
        </div>

        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('history') }}">Prediction History</a></li>
        </ul>

    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <!-- Left Content -->

        <div class="left">

            <ul>
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('history') }}">Prediction History</a></li>
            </ul>
                and Machine Learning technology with stunning real-time analytics.
            </p>

            <div class="btns">

                <button class="btn btn-primary">
                    Explore AI
                </button>

                <button class="btn btn-outline">
                    Learn More
                </button>

            </div>

        </div>

        <!-- Prediction Card -->

        <div class="card">

            <h2>Car Price Prediction</h2>

            <p>
                Enter car specifications below
            </p>

            <form action="/predict" method="POST">

                <div class="input-box">
                    <input 
                        type="number"
                        name="horsepower"
                        placeholder="Enter Horsepower"
                        required
                    >
                </div>

                <div class="input-box">
                    <input 
                        type="number"
                        name="enginesize"
                        placeholder="Enter Engine Size"
                        required
                    >
                </div>

                <div class="input-box">
                    <input 
                        type="number"
                        name="curbweight"
                        placeholder="Enter Curb Weight"
                        required
                    >
                </div>

                <button type="submit" class="predict-btn">
                    Predict Price
                </button>

            </form>

            {% if prediction_text %}

            <div class="result">
                <h3>{{ prediction_text }}</h3>
            </div>

            {% endif %}

        </div>

    </section>

</body>
</html>
